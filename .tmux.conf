# Change prefix from C-b (conflicts with Emacs backward-char) to C-z.
# Emacs has C-z unbound here, so passing it through does nothing harmful.
unbind C-b
set -g prefix C-z
bind C-z send-prefix

# Emacs-style keys in copy-mode
setw -g mode-keys emacs

# Bigger scrollback
set -g history-limit 10000

# Remove escape key delay (Emacs notices this otherwise)
set -g escape-time 0
